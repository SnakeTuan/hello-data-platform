hub:
  config:
    JupyterHub:
      authenticator_class: dummy
    DummyAuthenticator:
      password: "password"
    Authenticator:
      admin_users:
        - tuantm

singleuser:
  # PySpark image from quay.io (avoids Docker Hub rate limits)
  image:
    name: quay.io/jupyter/pyspark-notebook
    tag: "latest"

  # No persistent storage for now (can add later)
  storage:
    type: none

  # Disable network policies (allow notebook pods to reach cluster services)
  networkPolicy:
    enabled: false

  # Inject Unity Catalog connection info into every notebook
  # S3 credentials are vended by UC — no need to put AWS keys here
  extraEnv:
    UNITY_CATALOG_ENDPOINT: "http://server.unity-catalog.svc.cluster.local:8080"

proxy:
  service:
    type: ClusterIP

# Disable user scheduler (not needed for single user)
scheduling:
  userScheduler:
    enabled: false
